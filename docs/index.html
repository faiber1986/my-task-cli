<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>task — a keyboard-first task manager</title>
  <meta name="description" content="A browser task manager with a CLI soul. Type commands or click — your tasks live in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #14121c;
      --bg-grain: #17141f;
      --surface: #1e1b29;
      --surface-2: #272334;
      --line: #322c42;
      --text: #ede7da;
      --muted: #9a93a8;
      --faint: #6d6780;
      --amber: #e8b04b;
      --amber-glow: #ffc864;
      --p-high: #ff6b5e;
      --p-med: #e8b04b;
      --p-low: #6fb3c9;
      --done: #7bc47f;
      --danger: #ff6b5e;
      --radius: 10px;
      --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; }

    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(232,176,75,0.08), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: clamp(16px, 4vw, 40px);
    }

    .wrap { max-width: 760px; margin: 0 auto; }

    /* ---------- Header ---------- */
    header { margin-bottom: 22px; }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      font-family: var(--mono);
    }
    .brand .prompt { color: var(--amber); font-weight: 600; }
    .brand h1 {
      font-size: clamp(2rem, 7vw, 3rem);
      margin: 0;
      letter-spacing: -0.01em;
      font-weight: 600;
    }
    .brand .caret {
      display: inline-block;
      width: 0.55ch;
      height: 1.15em;
      transform: translateY(0.16em);
      background: var(--amber);
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .tagline {
      color: var(--muted);
      font-size: 0.98rem;
      margin: 8px 0 0 2px;
      max-width: 46ch;
    }

    /* ---------- Command bar (signature) ---------- */
    .console {
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 40px -28px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .cmd {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
    }
    .cmd .glyph { color: var(--amber); font-family: var(--mono); font-weight: 600; font-size: 1.05rem; }
    .cmd input {
      flex: 1;
      background: transparent;
      border: 0;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      caret-color: var(--amber-glow);
      min-width: 0;
    }
    .cmd input::placeholder { color: var(--faint); }
    .run {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--bg);
      background: var(--amber);
      border: 0;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .run:hover { background: var(--amber-glow); }
    .run:active { transform: translateY(1px); }

    .echo {
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      color: var(--muted);
      border-top: 1px solid transparent;
      transition: max-height 0.25s ease, padding 0.25s ease, border-color 0.25s ease;
    }
    .echo.show { max-height: 60px; padding: 10px 16px; border-top: 1px solid var(--line); }
    .echo.ok { color: var(--done); }
    .echo.err { color: var(--danger); }

    .hint {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--faint);
      margin: 10px 2px 0;
    }
    .hint b { color: var(--amber); font-weight: 500; }

    /* ---------- Filters ---------- */
    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 24px 2px 12px;
    }
    .seg { display: inline-flex; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 3px; }
    .seg button {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--muted);
      background: transparent;
      border: 0;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .seg button[aria-pressed="true"] { background: var(--surface-2); color: var(--text); box-shadow: inset 0 0 0 1px var(--line); }
    .active-tag {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--amber);
      background: rgba(232,176,75,0.1);
      border: 1px solid rgba(232,176,75,0.3);
      border-radius: 999px;
      padding: 4px 10px;
      cursor: pointer;
      display: none;
    }
    .active-tag.show { display: inline-flex; align-items: center; gap: 6px; }
    .active-tag::after { content: "×"; color: var(--muted); }

    /* ---------- Task list ---------- */
    .list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }

    .task {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 3px solid var(--pri, var(--faint));
      border-radius: var(--radius);
      padding: 12px 14px;
      animation: rise 0.28s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } }

    .task .id { font-family: var(--mono); color: var(--amber); font-weight: 500; font-size: 0.9rem; }

    .check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--line);
      background: transparent;
      cursor: pointer;
      display: grid; place-items: center;
      color: var(--done);
      flex: none;
      transition: border-color 0.15s ease;
    }
    .check:hover { border-color: var(--done); }
    .check svg { width: 12px; height: 12px; opacity: 0; }
    .task.done .check { border-color: var(--done); background: rgba(123,196,127,0.14); }
    .task.done .check svg { opacity: 1; }

    .body { min-width: 0; }
    .title { font-size: 1rem; word-break: break-word; }
    .task.done .title { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--faint); }
    .title[contenteditable="true"] { outline: 1px solid var(--amber); border-radius: 4px; padding: 1px 4px; }

    .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; align-items: center; }
    .pri { font-family: var(--mono); font-size: 0.72rem; text-transform: lowercase; color: var(--pri, var(--faint)); }
    .chip {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 9px;
      cursor: pointer;
    }
    .chip:hover { color: var(--amber); border-color: rgba(232,176,75,0.4); }

    .actions { display: flex; gap: 4px; }
    .iconbtn {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .iconbtn:hover { color: var(--text); border-color: var(--line); background: var(--surface-2); }
    .iconbtn.danger:hover { color: var(--danger); border-color: rgba(255,107,94,0.4); }
    .iconbtn svg { width: 15px; height: 15px; }

    /* ---------- Empty + footer ---------- */
    .empty {
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 46px 20px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }
    .empty b { color: var(--amber); font-weight: 500; }

    footer {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--faint);
    }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--line); }
    footer a:hover { color: var(--amber); }

    :focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px; }

    @media (max-width: 560px) {
      .task { grid-template-columns: auto 1fr; grid-template-areas: "check id" "body body" "actions actions"; }
      .task .id { grid-area: id; justify-self: start; }
      .check { grid-area: check; }
      .body { grid-area: body; }
      .actions { grid-area: actions; justify-content: flex-end; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="prompt">&gt;</span>
        <h1>task<span class="caret" aria-hidden="true"></span></h1>
      </div>
      <p class="tagline">A keyboard-first task manager with a CLI soul. Type a command or click — everything lives in your browser.</p>
    </header>

    <div class="console">
      <form class="cmd" id="cmdForm" autocomplete="off">
        <span class="glyph" aria-hidden="true">&gt;</span>
        <input id="cmdInput" name="cmd" aria-label="Command"
               placeholder='add "Buy milk" --priority high --tag home' />
        <button class="run" type="submit">run ↵</button>
      </form>
      <div class="echo" id="echo" role="status" aria-live="polite"></div>
    </div>
    <p class="hint">Try <b>add "Ship it" --priority high --tag work</b> · <b>complete 1</b> · <b>reopen 1</b> · <b>list --tag work</b> · <b>help</b></p>

    <div class="filters">
      <div class="seg" role="group" aria-label="Filter by state">
        <button data-state="pending" aria-pressed="true">pending</button>
        <button data-state="all" aria-pressed="false">all</button>
        <button data-state="completed" aria-pressed="false">completed</button>
      </div>
      <button class="active-tag" id="activeTag" title="Clear tag filter"></button>
    </div>

    <ul class="list" id="list"></ul>

    <footer>
      <span id="stats">0 tasks</span>
      <span>web sibling of the <a href="https://github.com/faiber1986/my-task-cli" target="_blank" rel="noopener">task CLI</a></span>
    </footer>
  </div>

  <script>
  (() => {
    "use strict";
    const KEY = "my-task-cli/v1";
    const PRIORITIES = ["high", "medium", "low"];

    // ---------- Store (same schema as the CLI's tasks.json) ----------
    function load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return { version: 1, nextId: 1, tasks: [] };
        const d = JSON.parse(raw);
        if (typeof d.nextId !== "number" || !Array.isArray(d.tasks)) throw 0;
        return d;
      } catch { return { version: 1, nextId: 1, tasks: [] }; }
    }
    function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

    let store = load();

    // ---------- Domain (mirrors src/domain/taskCollection.ts) ----------
    const now = () => new Date().toISOString();

    function normalizeTags(list) {
      const seen = new Set(), out = [];
      for (const t of list || []) {
        const trimmed = String(t).trim();
        if (!trimmed) continue;
        const key = trimmed.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key); out.push(trimmed);
      }
      return out;
    }
    function parsePriority(raw) {
      if (raw == null) return null;
      const v = String(raw).trim().toLowerCase();
      if (v === "") return null;
      if (PRIORITIES.includes(v)) return v;
      throw new Error(`Invalid priority "${raw}". Accepted: ${PRIORITIES.join(", ")}.`);
    }
    function find(id) {
      const t = store.tasks.find((t) => t.id === id);
      if (!t) throw new Error(`Task #${id} not found`);
      return t;
    }
    function add({ title, priority = null, tags = [] }) {
      const clean = String(title || "").trim();
      if (!clean) throw new Error("Title must not be empty.");
      const task = { id: store.nextId, title: clean, state: "pending", priority, tags: normalizeTags(tags), createdAt: now(), completedAt: null };
      store = { ...store, nextId: store.nextId + 1, tasks: [...store.tasks, task] };
      return task;
    }
    function complete(id) {
      const t = find(id);
      if (t.state === "completed") return { task: t, noop: true };
      Object.assign(t, { state: "completed", completedAt: now() });
      return { task: t, noop: false };
    }
    function reopen(id) {
      const t = find(id);
      if (t.state === "pending") return { task: t, noop: true };
      Object.assign(t, { state: "pending", completedAt: null });
      return { task: t, noop: false };
    }
    function edit(id, changes) {
      const t = find(id);
      if (!("title" in changes) && !("priority" in changes) && !("tags" in changes))
        throw new Error("Edit must change at least one attribute.");
      if ("title" in changes) {
        const clean = String(changes.title).trim();
        if (!clean) throw new Error("Title must not be empty.");
        t.title = clean;
      }
      if ("priority" in changes) t.priority = changes.priority;
      if ("tags" in changes) t.tags = normalizeTags(changes.tags);
      return t;
    }
    function remove(id) {
      const t = find(id);
      store = { ...store, tasks: store.tasks.filter((x) => x.id !== id) };
      return t;
    }
    function list(filters = {}) {
      const wantTags = (filters.tags || []).map((t) => t.toLowerCase());
      return store.tasks.filter((task) => {
        if (filters.state) { if (task.state !== filters.state) return false; }
        else if (!filters.all) { if (task.state !== "pending") return false; }
        if (filters.priority && task.priority !== filters.priority) return false;
        if (wantTags.length) {
          const tt = task.tags.map((t) => t.toLowerCase());
          if (!wantTags.every((t) => tt.includes(t))) return false;
        }
        return true;
      });
    }

    // ---------- Command parser (mirrors the CLI grammar) ----------
    function tokenize(input) {
      const out = [];
      const re = /"([^"]*)"|'([^']*)'|(\S+)/g;
      let m;
      while ((m = re.exec(input)) !== null) out.push(m[1] ?? m[2] ?? m[3]);
      return out;
    }
    function parseId(raw) {
      if (!/^\d+$/.test(raw || "")) throw new Error(`Invalid task id "${raw}". Expected a positive integer.`);
      const id = Number(raw);
      if (id < 1) throw new Error(`Invalid task id "${raw}".`);
      return id;
    }
    // Split tokens into positionals + flags (supports repeated --tag and boolean flags)
    function parseFlags(tokens) {
      const pos = [], flags = {};
      const bool = new Set(["all", "clear-priority", "clear-tags"]);
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i];
        if (tok.startsWith("--")) {
          const name = tok.slice(2);
          if (bool.has(name)) { flags[name] = true; continue; }
          const val = tokens[++i];
          if (name === "tag") (flags.tag ||= []).push(val);
          else flags[name] = val;
        } else pos.push(tok);
      }
      return { pos, flags };
    }

    function runCommand(line) {
      const tokens = tokenize(line.trim());
      if (!tokens.length) return null;
      const cmd = tokens[0].toLowerCase();
      const { pos, flags } = parseFlags(tokens.slice(1));

      switch (cmd) {
        case "add": {
          const t = add({ title: pos[0], priority: parsePriority(flags.priority ?? null), tags: flags.tag || [] });
          save(store);
          return { ok: `Added task #${t.id}: "${t.title}"` };
        }
        case "complete": { const { task, noop } = complete(parseId(pos[0])); save(store); return { ok: noop ? `Task #${task.id} was already completed.` : `Completed task #${task.id}.` }; }
        case "reopen": { const { task, noop } = reopen(parseId(pos[0])); save(store); return { ok: noop ? `Task #${task.id} was already pending.` : `Re-opened task #${task.id}.` }; }
        case "remove": case "rm": { const t = remove(parseId(pos[0])); save(store); return { ok: `Removed task #${t.id}.` }; }
        case "edit": {
          const id = parseId(pos[0]);
          const changes = {};
          if ("title" in flags) changes.title = flags.title;
          if (flags["clear-priority"]) changes.priority = null;
          else if ("priority" in flags) changes.priority = parsePriority(flags.priority);
          if (flags["clear-tags"]) changes.tags = [];
          else if (flags.tag) changes.tags = flags.tag;
          const t = edit(id, changes); save(store);
          return { ok: `Updated task #${t.id}.` };
        }
        case "list": case "ls": {
          // list drives the on-screen filter, mirroring the CLI's view
          view.state = flags.all ? "all" : (flags.state || "pending");
          view.priority = flags.priority ? parsePriority(flags.priority) : null;
          view.tag = flags.tag ? flags.tag[0] : null;
          const count = list(currentFilters()).length;
          return { ok: `Showing ${count} task${count === 1 ? "" : "s"}.` };
        }
        case "help": return { ok: "Commands: add · list · complete · reopen · edit · remove · help. Flags: --priority, --tag, --state, --all, --clear-priority, --clear-tags." };
        default: throw new Error(`Unknown command "${cmd}". Type "help".`);
      }
    }

    // ---------- View state ----------
    const view = { state: "pending", priority: null, tag: null };
    function currentFilters() {
      const f = {};
      if (view.state === "all") f.all = true;
      else f.state = view.state;
      if (view.priority) f.priority = view.priority;
      if (view.tag) f.tags = [view.tag];
      return f;
    }

    // ---------- Render ----------
    const els = {
      form: document.getElementById("cmdForm"),
      input: document.getElementById("cmdInput"),
      echo: document.getElementById("echo"),
      list: document.getElementById("list"),
      stats: document.getElementById("stats"),
      activeTag: document.getElementById("activeTag"),
      seg: document.querySelectorAll(".seg button"),
    };
    const priColor = { high: "var(--p-high)", medium: "var(--p-med)", low: "var(--p-low)" };
    const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    const REOPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>';
    const TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';

    function esc(s) { return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

    function render() {
      // sync filter UI
      els.seg.forEach((b) => b.setAttribute("aria-pressed", String(b.dataset.state === view.state)));
      if (view.tag) { els.activeTag.textContent = "#" + view.tag; els.activeTag.classList.add("show"); }
      else els.activeTag.classList.remove("show");

      const tasks = list(currentFilters()).slice().reverse();
      els.list.innerHTML = "";

      if (!tasks.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = store.tasks.length
          ? "No matching tasks. Adjust the filters above."
          : 'Nothing here yet. Type <b>add "your first task"</b> and hit run.';
        els.list.appendChild(empty);
      }

      for (const t of tasks) {
        const li = document.createElement("li");
        li.className = "task" + (t.state === "completed" ? " done" : "");
        if (t.priority) li.style.setProperty("--pri", priColor[t.priority]);
        li.innerHTML = `
          <span class="id">#${t.id}</span>
          <button class="check" title="${t.state === "completed" ? "Re-open" : "Complete"}" data-act="toggle" data-id="${t.id}">${CHECK}</button>
          <div class="body">
            <div class="title" data-id="${t.id}">${esc(t.title)}</div>
            <div class="meta">
              ${t.priority ? `<span class="pri" style="--pri:${priColor[t.priority]}">● ${t.priority}</span>` : ""}
              ${t.tags.map((tag) => `<button class="chip" data-tag="${esc(tag)}">${esc(tag)}</button>`).join("")}
            </div>
          </div>
          <div class="actions">
            ${t.state === "completed" ? `<button class="iconbtn" title="Re-open" data-act="reopen" data-id="${t.id}">${REOPEN}</button>` : ""}
            <button class="iconbtn danger" title="Remove" data-act="remove" data-id="${t.id}">${TRASH}</button>
          </div>`;
        els.list.appendChild(li);
      }

      const total = store.tasks.length;
      const pending = store.tasks.filter((t) => t.state === "pending").length;
      els.stats.textContent = `${total} task${total === 1 ? "" : "s"} · ${pending} pending · ${total - pending} done`;
    }

    function flash(msg, kind) {
      els.echo.textContent = msg;
      els.echo.className = "echo show" + (kind ? " " + kind : "");
      clearTimeout(flash._t);
      flash._t = setTimeout(() => { els.echo.className = "echo"; }, 3200);
    }

    // ---------- Events ----------
    els.form.addEventListener("submit", (e) => {
      e.preventDefault();
      const line = els.input.value;
      if (!line.trim()) return;
      try {
        const res = runCommand(line);
        if (res) { flash(res.ok, "ok"); els.input.value = ""; render(); }
      } catch (err) { flash("Error: " + err.message, "err"); }
    });

    els.seg.forEach((b) => b.addEventListener("click", () => { view.state = b.dataset.state; render(); }));
    els.activeTag.addEventListener("click", () => { view.tag = null; render(); });

    els.list.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (chip) { view.tag = chip.dataset.tag; render(); return; }
      const btn = e.target.closest("[data-act]");
      if (!btn) return;
      const id = Number(btn.dataset.id);
      try {
        if (btn.dataset.act === "toggle") { const t = find(id); t.state === "completed" ? reopen(id) : complete(id); }
        else if (btn.dataset.act === "reopen") reopen(id);
        else if (btn.dataset.act === "remove") remove(id);
        save(store); render();
      } catch (err) { flash("Error: " + err.message, "err"); }
    });

    // inline title editing
    els.list.addEventListener("dblclick", (e) => {
      const title = e.target.closest(".title");
      if (!title) return;
      title.setAttribute("contenteditable", "true");
      title.focus();
      const sel = window.getSelection(), range = document.createRange();
      range.selectNodeContents(title); sel.removeAllRanges(); sel.addRange(range);
    });
    els.list.addEventListener("keydown", (e) => {
      const title = e.target.closest?.(".title[contenteditable='true']");
      if (!title) return;
      if (e.key === "Enter") { e.preventDefault(); title.blur(); }
      if (e.key === "Escape") { title.textContent = find(Number(title.dataset.id)).title; title.blur(); }
    });
    els.list.addEventListener("blur", (e) => {
      const title = e.target.closest?.(".title[contenteditable='true']");
      if (!title) return;
      title.removeAttribute("contenteditable");
      try { edit(Number(title.dataset.id), { title: title.textContent }); save(store); flash("Updated task.", "ok"); }
      catch (err) { flash("Error: " + err.message, "err"); }
      render();
    }, true);

    // keyboard: "/" focuses the command bar
    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== els.input) { e.preventDefault(); els.input.focus(); }
    });

    render();
    els.input.focus();
  })();
  </script>
</body>
</html>
